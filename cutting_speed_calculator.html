<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>切削速度 / 回転数 変換ツール</title>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Noto+Sans+JP:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0e0f11;
    --surface: #16181c;
    --surface2: #1e2128;
    --border: #2a2d35;
    --accent: #e8ff5a;
    --accent-dim: #b8cc3a;
    --text: #e4e6ea;
    --text-muted: #6b7280;
    --text-dim: #9ca3af;
    --mono: 'Share Tech Mono', monospace;
    --sans: 'Noto Sans JP', sans-serif;
    --blue: #5ab4ff;
    --blue-dim: #3a8fd4;
    --blue-bg: #1a2535;
    --amber: #ffcc5a;
    --amber-bg: #251f10;
    --green: #5affb0;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 2rem 1rem;
    position: relative;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      repeating-linear-gradient(0deg, transparent, transparent 39px, #ffffff04 39px, #ffffff04 40px),
      repeating-linear-gradient(90deg, transparent, transparent 39px, #ffffff04 39px, #ffffff04 40px);
    pointer-events: none;
  }

  .container {
    width: 100%;
    max-width: 500px;
    position: relative;
    z-index: 1;
    animation: fadeUp 0.5s ease both;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(20px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .header {
    margin-bottom: 2rem;
    border-left: 3px solid var(--accent);
    padding-left: 1rem;
  }

  .header-tag {
    font-family: var(--mono);
    font-size: 10px;
    color: var(--accent);
    letter-spacing: 0.2em;
    margin-bottom: 6px;
  }

  .header h1 {
    font-family: var(--mono);
    font-size: 20px;
    font-weight: 400;
    letter-spacing: 0.05em;
    line-height: 1.3;
  }

  .header p {
    font-size: 11px;
    color: var(--text-muted);
    margin-top: 5px;
    font-weight: 300;
  }

  .mode-switch {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 0;
    margin-bottom: 1rem;
    border: 1px solid var(--border);
    overflow: hidden;
  }

  .mode-btn {
    padding: 12px;
    background: transparent;
    border: none;
    color: var(--text-muted);
    font-family: var(--mono);
    font-size: 12px;
    letter-spacing: 0.1em;
    cursor: pointer;
    transition: all 0.2s;
    text-align: center;
    line-height: 1.4;
  }

  .mode-btn:first-child { border-right: 1px solid var(--border); }

  .mode-btn.active-vc {
    background: var(--blue-bg);
    color: var(--blue);
  }

  .mode-btn.active-rpm {
    background: var(--amber-bg);
    color: var(--amber);
  }

  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    padding: 1.75rem;
    margin-bottom: 1rem;
    position: relative;
  }

  .card.mode-vc::before {
    content: '';
    position: absolute;
    top: 0; left: 0;
    width: 40px; height: 2px;
    background: var(--blue);
  }

  .card.mode-rpm::before {
    content: '';
    position: absolute;
    top: 0; left: 0;
    width: 40px; height: 2px;
    background: var(--amber);
  }

  .field { margin-bottom: 1.5rem; }
  .field:last-child { margin-bottom: 0; }

  .field-label {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    margin-bottom: 8px;
  }

  .field-label span {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--text-muted);
    letter-spacing: 0.15em;
  }

  .field-label .unit-tag {
    font-size: 10px;
    color: var(--accent-dim);
  }

  .input-wrap {
    position: relative;
    display: flex;
    align-items: center;
  }

  input[type="number"] {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: var(--mono);
    font-size: 20px;
    padding: 12px 70px 12px 16px;
    outline: none;
    transition: border-color 0.2s;
    -moz-appearance: textfield;
    appearance: textfield;
  }

  input[type="number"]::-webkit-inner-spin-button,
  input[type="number"]::-webkit-outer-spin-button { -webkit-appearance: none; }

  .mode-vc input[type="number"]:focus { border-color: var(--blue); }
  .mode-rpm input[type="number"]:focus { border-color: var(--amber); }

  input[type="number"]::placeholder { color: var(--border); font-size: 14px; }

  .input-unit {
    position: absolute;
    right: 14px;
    font-family: var(--mono);
    font-size: 11px;
    color: var(--text-muted);
    pointer-events: none;
    white-space: nowrap;
  }

  .result-card {
    background: var(--surface2);
    border: 1px solid var(--border);
    padding: 1.75rem;
    position: relative;
    transition: border-color 0.3s;
  }

  .result-card.has-result.mode-vc { border-color: var(--blue); }
  .result-card.has-result.mode-rpm { border-color: var(--amber); }

  .result-label {
    font-family: var(--mono);
    font-size: 10px;
    color: var(--text-muted);
    letter-spacing: 0.2em;
    margin-bottom: 10px;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .result-label::before {
    content: '';
    display: inline-block;
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--text-muted);
    transition: background 0.3s;
  }

  .result-card.has-result.mode-vc .result-label::before { background: var(--blue); }
  .result-card.has-result.mode-rpm .result-label::before { background: var(--amber); }

  .result-main {
    display: flex;
    align-items: baseline;
    gap: 10px;
  }

  .result-value {
    font-family: var(--mono);
    font-size: 46px;
    letter-spacing: -0.02em;
    line-height: 1;
    transition: color 0.3s;
    color: var(--border);
  }

  .result-card.has-result.mode-vc .result-value { color: var(--blue); }
  .result-card.has-result.mode-rpm .result-value { color: var(--amber); }

  .result-unit-big {
    font-family: var(--mono);
    font-size: 14px;
    color: var(--text-muted);
  }

  .formula-bar {
    background: var(--bg);
    border: 1px solid var(--border);
    border-top: none;
    padding: 9px 16px;
    font-family: var(--mono);
    font-size: 11px;
    color: var(--text-muted);
    letter-spacing: 0.05em;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .formula-bar .eq { color: var(--accent-dim); }

  .reset-btn {
    width: 100%;
    margin-top: 1rem;
    padding: 11px;
    background: transparent;
    border: 1px solid var(--border);
    color: var(--text-muted);
    font-family: var(--mono);
    font-size: 11px;
    letter-spacing: 0.2em;
    cursor: pointer;
    transition: all 0.2s;
  }

  .reset-btn:hover { border-color: #ff5a5a; color: #ff5a5a; }

  .version-tag {
    text-align: right;
    font-family: var(--mono);
    font-size: 10px;
    color: var(--border);
    margin-top: 1rem;
  }
</style>
</head>
<body>
<div class="container">

  <div class="header">
    <div class="header-tag">Machining Tool v2.0</div>
    <h1>切削速度 / 回転数<br>変換ツール</h1>
    <p>Vc ⇄ n &nbsp;|&nbsp; π × D × n / 1000 = Vc</p>
  </div>

  <div class="mode-switch">
    <button class="mode-btn active-vc" id="btn-vc" onclick="setMode('vc')">
      切削速度 → 回転数<br>
      <span style="font-size:10px;opacity:0.7;">Vc → n</span>
    </button>
    <button class="mode-btn" id="btn-rpm" onclick="setMode('rpm')">
      回転数 → 切削速度<br>
      <span style="font-size:10px;opacity:0.7;">n → Vc</span>
    </button>
  </div>

  <div class="card mode-vc" id="input-card">

    <div class="field" id="field-vc" style="display:block">
      <div class="field-label">
        <span>切削速度 Vc</span>
        <span class="unit-tag">CUTTING SPEED</span>
      </div>
      <div class="input-wrap">
        <input type="number" id="vc" placeholder="0" min="0" step="any" oninput="calculate()">
        <span class="input-unit">m/min</span>
      </div>
    </div>

    <div class="field" id="field-rpm" style="display:none">
      <div class="field-label">
        <span>回転数 n</span>
        <span class="unit-tag">SPINDLE SPEED</span>
      </div>
      <div class="input-wrap">
        <input type="number" id="rpm-in" placeholder="0" min="0" step="any" oninput="calculate()">
        <span class="input-unit">min⁻¹</span>
      </div>
    </div>

    <div class="field">
      <div class="field-label">
        <span>工具径 D</span>
        <span class="unit-tag">DIAMETER</span>
      </div>
      <div class="input-wrap">
        <input type="number" id="diameter" placeholder="0" min="0" step="any" oninput="calculate()">
        <span class="input-unit">mm</span>
      </div>
    </div>

  </div>

  <div class="result-card mode-vc" id="result-card">
    <div class="result-label" id="result-label">回転数 / SPINDLE SPEED</div>
    <div class="result-main">
      <div class="result-value" id="result-value">——</div>
      <div class="result-unit-big" id="result-unit">min⁻¹</div>
    </div>
  </div>

  <div class="formula-bar" id="formula-bar">
    <span id="formula-text">n = (Vc × 1000) / (π × D)</span>
    <span class="eq">&nbsp;|&nbsp;</span>
    <span id="formula-sub">速度から回転数を計算</span>
  </div>

  <button class="reset-btn" onclick="resetAll()">◀ リセット / RESET</button>
  <div class="version-tag">CALC-002 // 2024</div>
</div>

<script>
  var currentMode = 'vc';

  function setMode(mode) {
    currentMode = mode;

    var btnVc = document.getElementById('btn-vc');
    var btnRpm = document.getElementById('btn-rpm');
    var inputCard = document.getElementById('input-card');
    var resultCard = document.getElementById('result-card');
    var fieldVc = document.getElementById('field-vc');
    var fieldRpm = document.getElementById('field-rpm');
    var resultLabel = document.getElementById('result-label');
    var resultUnit = document.getElementById('result-unit');
    var formulaText = document.getElementById('formula-text');
    var formulaSub = document.getElementById('formula-sub');

    if (mode === 'vc') {
      btnVc.className = 'mode-btn active-vc';
      btnRpm.className = 'mode-btn';
      inputCard.className = 'card mode-vc';
      resultCard.className = 'result-card mode-vc';
      fieldVc.style.display = 'block';
      fieldRpm.style.display = 'none';
      resultLabel.textContent = '回転数 / SPINDLE SPEED';
      resultUnit.textContent = 'min⁻¹';
      formulaText.textContent = 'n = (Vc × 1000) / (π × D)';
      formulaSub.textContent = '速度から回転数を計算';
    } else {
      btnVc.className = 'mode-btn';
      btnRpm.className = 'mode-btn active-rpm';
      inputCard.className = 'card mode-rpm';
      resultCard.className = 'result-card mode-rpm';
      fieldVc.style.display = 'none';
      fieldRpm.style.display = 'block';
      resultLabel.textContent = '切削速度 / CUTTING SPEED';
      resultUnit.textContent = 'm/min';
      formulaText.textContent = 'Vc = (π × D × n) / 1000';
      formulaSub.textContent = '回転数から速度を計算';
    }

    resetResult();
    calculate();
  }

  function calculate() {
    var D = parseFloat(document.getElementById('diameter').value);
    var resultCard = document.getElementById('result-card');
    var resultValue = document.getElementById('result-value');

    if (isNaN(D) || D <= 0) {
      resetResult();
      return;
    }

    if (currentMode === 'vc') {
      var Vc = parseFloat(document.getElementById('vc').value);
      if (isNaN(Vc) || Vc <= 0) { resetResult(); return; }
      var n = (Vc * 1000) / (Math.PI * D);
      resultValue.textContent = Math.round(n).toLocaleString();
      resultCard.className = 'result-card mode-vc has-result';
    } else {
      var rpm = parseFloat(document.getElementById('rpm-in').value);
      if (isNaN(rpm) || rpm <= 0) { resetResult(); return; }
      var vc = (Math.PI * D * rpm) / 1000;
      resultValue.textContent = vc.toFixed(1);
      resultCard.className = 'result-card mode-rpm has-result';
    }
  }

  function resetResult() {
    var resultCard = document.getElementById('result-card');
    var resultValue = document.getElementById('result-value');
    resultValue.textContent = '——';
    resultCard.className = 'result-card ' + (currentMode === 'vc' ? 'mode-vc' : 'mode-rpm');
  }

  function resetAll() {
    document.getElementById('vc').value = '';
    document.getElementById('rpm-in').value = '';
    document.getElementById('diameter').value = '';
    resetResult();
  }
</script>
</body>
</html>
